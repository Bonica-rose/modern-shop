<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop</title>
    <meta name="description"
        content="Explore Modern Shop: A high-performance e-commerce storefront featuring real-time product filtering, category browsing, and a seamless sliding cart experience powered by DummyJSON API.">

    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./font-awesome/all.min.css">
    <link rel="stylesheet" href="./css/app.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-bag-shopping me-2"></i>MODERN-SHOP</a>

            <a href="./pages/yourCart.html" class="btn btn-dark position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartCount"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Controls Section -->
        <div class="row g-3 mb-4 align-items-center bg-white p-3 rounded shadow-sm">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
                </div>
            </div>
            <div class="col-md-4">
                <select id="categoryFilter" class="form-select text-capitalize">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div class="col-md-3 text-end">
                <button id="shuffleBtn" class="btn btn-outline-secondary w-100"><i
                        class="fa-solid fa-shuffle me-2"></i>Shuffle</button>
            </div>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <!-- Loading Spinner -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Fetching products...</p>
            </div>
        </div>
    </div>    

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/rate.js"></script>
    <script src="./js/cart.js"></script>    
    <script src="./js/main.js"></script>

</body>

</html>
